# ============================================================================
# Javis OS - HOSTINGER VPS (Docker Manager). LINK MẶC ĐỊNH + HTTPS TỰ ĐỘNG như app Catalog (Hermes/n8n).
#
# Hostinger có sẵn: (1) wildcard DNS *.<hostname-vps>.hstgr.cloud trỏ về VPS, (2) reverse proxy Traefik
# tự cấp SSL, (3) biến TRAEFIK_HOST = hostname VPS. File này gắn nhãn Traefik ĐÚNG mẫu Hermes
# (mấu chốt: KHÔNG khai báo network) nên deploy xong là CÓ LINK chạy HTTPS, KHÔNG cần cấu hình gì.
#
# CÁCH DÙNG (đơn giản nhất - không cần đặt biến):
#   1) Docker Manager > Compose > URL > dán:
#      https://raw.githubusercontent.com/blogminhquy/javis-os/main/docker-compose.hostinger.yml
#   2) Deploy. Link tự động = <tên-project>.<hostname-vps>.hstgr.cloud
#      (vd javis-os.srv1782015.hstgr.cloud). Traefik tự cấp SSL sau 1-3 phút. Bấm Open để vào.
#
# MUỐN TÊN MIỀN RIÊNG (vd javisos.com):
#   - Trỏ DNS: bản ghi  A  <tên miền>  ->  IP VPS (xem IP ở hPanel > VPS).
#   - Ô Environment đặt:  DOMAIN_NAME=<tên miền>  (vd DOMAIN_NAME=javisos.com) > Deploy lại.
#
# GHI CHÚ:
#   - Nếu link tự động KHÔNG lên (Traefik của bạn không có biến TRAEFIK_HOST): đặt tay ô Environment
#     DOMAIN_NAME=javis.<hostname-vps>.hstgr.cloud  (vd DOMAIN_NAME=javis.srv1782015.hstgr.cloud).
#   - Vẫn publish 7777 làm đường vào dự phòng (nút Open / http://<ip>:7777) khi cert chưa cấp xong.
#   - VPS KHÔNG phải Hostinger: bỏ file này, dùng docker-compose.yml + docker-compose.https.yml (Caddy).
#   - Image GHCR phải để PUBLIC (GitHub > Packages > javis-os > Package settings > Public).
# ============================================================================
services:
  javis:
    image: ghcr.io/blogminhquy/javis-os:latest
    container_name: javis
    restart: unless-stopped
    pull_policy: always
    environment:
      JAVIS_HOST: 0.0.0.0
      JAVIS_PORT: "7777"
      JAVIS_REQUIRE_LOGIN: "1"     # ÉP đăng nhập/đăng ký khi mở app (public)
      JAVIS_STATE_DIR: /data/state
      BRAIN_PATH: /data/brain
      BRAINS_DIR: /brains
      OBSIDIAN_VAULT_PATH: /data/vault
      CLAUDE_CWD: /app
    ports:
      - "7777:7777"                 # đường vào dự phòng (nút Open / http://<ip>:7777)
    labels:
      # Copy đúng mẫu Hermes: KHÔNG có traefik.docker.network, KHÔNG có networks external.
      # Tên router/service = ${COMPOSE_PROJECT_NAME} (tên project) → mỗi bản deploy 1 tên khác nhau,
      # chạy được NHIỀU bản trên cùng VPS không đụng nhau (giống đuôi -efxd của Hermes).
      # HOST tự động = <tên-project>.${TRAEFIK_HOST} (Hostinger tự cấp TRAEFIK_HOST = hostname VPS)
      # → giống Hermes, KHÔNG cần đặt gì. Muốn tên miền riêng thì đặt biến DOMAIN_NAME để ghi đè.
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-javis}.rule=Host(`${DOMAIN_NAME:-${COMPOSE_PROJECT_NAME}.${TRAEFIK_HOST}}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-javis}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-javis}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-javis}.loadbalancer.server.port=7777
    volumes:
      - javis-data:/data
      - javis-brains:/brains
      - claude-auth:/home/javis/.claude
      - codex-auth:/home/javis/.codex
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:'+os.getenv('JAVIS_PORT','7777')+'/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  javis-data:
  javis-brains:
  claude-auth:
  codex-auth:
